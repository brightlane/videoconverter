name: Daily Programmatic SEO Build

on:
  schedule:
    # Automatically triggers at exactly 00:00 UTC every single day
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Injects a manual "Run Workflow" button inside your GitHub Actions dashboard

permissions:
  contents: write  # Grants the automated cloud runner push-access to your branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Pull the latest state of your branch onto the cloud workspace runner
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Establish a stable python execution container environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 3: Run your enhanced build.py to map the cross-linking matrix, subpages, and index schemas
    - name: Execute Programmatic Builder Engine
      run: python build.py

    # Step 4: Verify differences, stamp the cloud push, and update live branch assets
    - name: Check, Commit, and Deploy Production Matrix Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Explicitly stage the programmatic components generated or modified by build.py
        git add index.html blog/*.html sitemap.xml robots.txt llms.txt
        
        # Prevent errors by checking if files actually changed before making a commit
        if git diff-index --quiet HEAD --; then
          echo "No new programmatic content modifications or cross-link changes detected today."
        else
          git commit -m "automation loop: optimized 2026 conversion network build refresh with internal cross-linking matrix"
          git push
        fi
